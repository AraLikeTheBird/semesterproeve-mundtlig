<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Creator</title>
    <link rel="stylesheet" href="creator.css">
</head>
<body>
<header>
        <nav>
            <a class="logo" href="index.html"><img src="assets/placeholder-logo.png" alt="scary esa logo placeholder" width="50px" height="50px"></a>

            <ul class="navlinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="creator.html" target="_blank">Creator</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="burgertoggle">☰</div>
        </nav>
</header>
<main>
    <div class="app">

        <!-- LEFT INFO PANEL -->
        <div class="panel left">
            <h2 id="leftTitle">Why is X principle important?</h2>
            <p id="leftInfo">Select a mode to learn more.</p>
        </div>

        <!-- CENTER CREATOR -->
        <div class="creator">
            <!-- AVATAR PREVIEW -->
            <div class="preview" id="avatarPreview">
                <div class="avatar-stack">
                    <img id="body-layer" src="assets/body-empty-default.png">
                    <img id="head-layer" src="assets/head-start-image.png">
                    <img id="physicaltraits-layer" src="assets/physicaltraits-empty-default.png">
                    <img id="clothes-layer" src="assets/clothes-empty-default.png">
                    <img id="overclothes-layer" src="assets/overclothes-empty-default.png">
                    <img id="accesories-layer" src="assets/accesories-empty-default.png">
                </div>
            </div>
            <!-- CONTROLS -->
            <div class="controls">
                <!--modes-->
                <div class="modes">
                    <button data-mode="shape" class="mode">Shape</button>
                    <button data-mode="proportion" class="mode">Proportion</button>
                    <button data-mode="silhouette" class="mode">Silhouette</button>
                </div>
                <!--CATEGORIE-->
                <div class="categories">

                    <!-- SHAPE CATEGORIES -->
                    <div class="category-group" data-mode="shape">
                        <button data-category="head" class="cat">Head</button>
                        <button data-category="body" class="cat">body</button>
                    </div>

                    <!-- SILHOUETTE CATEGORIES -->
                    <div class="category-group hidden" data-mode="silhouette">
                        <button data-category="physicaltraits" class="cat">Ears and hair</button>
                        <button data-category="clothes" class="cat">Clothes</button>
                        <button data-category="overclothes" class="cat">top layers</button>
                        <button data-category="accesories" class="cat">Accessories</button>
                        <button data-category="silhouette-mode" class="cat">Silhouette Mode</button>
                    </div>

                    <!-- PROPORTION CATEGORIES -->
                    <div class="category-group hidden" data-mode="proportion">
                     <!--   <button data-category="arms">arms</button> -->
                        <button data-category="head" class="cat">head</button>
                        <button data-category="body" class="cat">body</button>
                    <!-- <button data-category="legs">leg</button> -->
                    </div>

                </div>
                <!-- SHAPE OPTIONS -->
                <div class="options" data-group="shape" data-category="head">
                    <button class="option" data-value="start-image">Start image</button>
                    <button class="option" data-value="round">Round</button>
                    <button class="option" data-value="tall-Rectangle">Tall Rectangle</button>
                    <button class="option" data-value="square">Square</button>
                    <button class="option" data-value="upwards-Triangle">Upwards Triangle</button>
                    <button class="option" data-value="reverse-Triangle">Reverse Diamond</button>
                </div>
                <div class="options hidden" data-group="shape" data-category="body">
                    <button class="option" data-value="empty-default">Empty</button>
                    <button class="option" data-value="round">Round</button>
                    <button class="option" data-value="tall-Rectangle">Tall Rectangle</button>
                    <button class="option" data-value="square">Square</button>
                    <button class="option" data-value="upwards-Triangle">Upwards Triangle</button>
                    <button class="option" data-value="reverse-Triangle">Reverse Diamond</button>
                </div>
                <!-- SILHOUETTE OPTIONS -->
                <div class="options hidden" data-group="silhouette" data-category="physicaltraits">
                    <button class="option" data-value="empty-default">Empty</button>
                    <button class="option" data-value="pointed-ears">Pointed ears</button>
                    <button class="option" data-value="human-ears">Human ears</button>
                    <button class="option" data-value="canine/cat-ears">canine/cat ears</button>
                    <button class="option" data-value="grazer-ears">grazer ears</button>
                    <button class="option" data-value="bob-hair">Bob hair</button>
                    <button class="option" data-value="slick-back">slick back</button>
                    <button class="option" data-value="half-updo">half updo</button>
                    <button class="option" data-value="intricate-design">intricate design</button>
                    <button class="option" data-value="messy-bun">messy bun</button>
                    <button class="option" data-value="long-loose-hair">long hair</button>

                </div>
                <div class="options hidden" data-group="silhouette" data-category="clothes">
                    <button class="option" data-value="empty-default">Empty</button>
                    <button class="option" data-value="wide-pants">wide pants</button>
                    <button class="option" data-value="baggy-pants">Baggy pants</button>
                    <button class="option" data-value="tight-pants"> tight pants</button>
                    <button class="option" data-value="tapered-pants">tapered pants</button>
                    <button class="option" data-value="shorts">Shorts</button>
                    <button class="option" data-value="wide-shorts">wide shorts</button>
                    <button class="option" data-value="tight-shorts"> tight shorts </button>
                    <button class="option" data-value="loose-skirt">loose skirt</button>
                    <button class="option" data-value="tight-skirt">tight skirt</button>
                    <button class="option" data-value="baggy-shirt">baggy shirt</button>
                    <button class="option" data-value="wide-crop-top"> wide crop top </button>
                    <button class="option" data-value="loose-wrap-skirt">loose wrap shirt <img src="assets/button%20covers/round%20head%20cover.png" width="45px"></button>
                </div>
                <div class="options hidden" data-group="silhouette" data-category="overclothes">
                    <button class="option" data-value="empty-default">Empty</button>
                    <button class="option" data-value="bolero-jacket">bolero jacket</button>
                    <button class="option" data-value="trench-coat">trench coat</button>
                    <button class="option" data-value="cape">cape</button>
                    <button class="option" data-value="scrunched-scarf">scrunched scarf</button>
                    <button class="option" data-value="loose-scarf">loose scarf</button>
                    <button class="option" data-value="wrapped-flannel">wrapped flannel</button>
                    <button class="option" data-value="hood">hood</button>
                    <button class="option" data-value="shoulder">shoulder jacket</button>
                </div>
                <div class="options hidden" data-group="silhouette" data-category="accesories">
                    <button class="option" data-value="empty-default">Empty</button>
                    <button class="option">Slim</button>
                    <button class="option">Wide</button>
                </div>

                <!-- proportions-->
               <!-- <div class="options hidden" data-group="proportion" data-category="arms">
                    <label>Width</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="width">

                    <label>Height</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="height">
                </div> -->
                <div class="options hidden" data-group="proportion" data-category="head">
                    <label data-value="width">Width</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="width">

                    <label>Height</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="height" >
                </div>
                <div class="options hidden" data-group="proportion" data-category="body">
                    <label>Width</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="width">

                    <label>Height</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="height">
                </div>
               <!-- <div class="options hidden" data-group="proportion" data-category="legs">
                    <label>Width</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="width">

                    <label>Height</label>
                    <input type="range" min="0.5" max="1.5" step="0.1" value="1" data-prop="height">
                </div> -->

                <!-- PROPORTION OPTIONS -->
                <div class="options hidden" data-group="proportion" data-category="slider">
                    <div class="option">Small head</div>
                    <div class="option">Balanced</div>
                    <div class="option">Big head</div>
                    <div class="option">Exaggerated</div>
                </div>
            </div>


        </div>
        <!-- RIGHT INFO PANEL -->
        <div class="panel right">
            <h2 id="rightTitle">What does X element do?</h2>
        <p id="rightInfo">Click an option to learn more.</p>
    </div>
    </div>
</main>
